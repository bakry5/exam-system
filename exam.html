<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam | Exam System</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
   
</head>
<body class="bg-light">
  
 

    <div class="container py-4">
     
        <div class="row mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">
                                    <i class="bi bi-person-circle text-primary me-2"></i>
                                    <span id="userFullName">Loading...</span>
                                </h5>
                                <p class="text-secondary mb-0">
                                    <i class="bi bi-question-circle"></i>
                                    Question <span id="currentQuestionNum">1</span> of <span id="totalQuestions">3</span>
                                </p>
                            </div>
                            <div class="text-center">
                                <div class="bg-light p-3 rounded">
                                    <small class="text-secondary d-block">Time Remaining</small>
                                    <h3 class="text-danger mb-0" id="timerDisplay">:50</h3>
                                </div>
                            </div>
                        </div>
                       
                        <div class="progress mt-3" style="height: 8px;">
                            <div class="progress-bar bg-primary" id="progressFill" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
          
            <div class="col-lg-8 mb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <!-- Question Header -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="text-primary mb-0">
                                <i class="bi bi-question-circle-fill"></i>
                                <span id="questionNumberDisplay">Question 1</span>
                            </h5>
                            <button class="btn btn-warning" id="markBtn">
                                <i class="bi bi-bookmark-plus"></i> Mark Question
                            </button>
                        </div>
                        
                       
                        <div class="mb-4 p-3 bg-light rounded">
                            <p class="h5 mb-0" id="questionText">Loading question...</p>
                        </div>
                        
                        
                        <div id="answersContainer" class="mb-4">
                        
                        </div>
                        
                   
                        <div class="d-flex justify-content-end">
                            <button class="btn btn-outline-secondary px-4 me-2" id="btnPrev">
                              <i class="bi bi-arrow-left"></i> Previous
                            <button class="btn btn-success px-5" id="nextBtn">
                                Next <i class="bi bi-arrow-right"></i>
                            </button>
                            

                        </div>

                    </div>
                </div>
            </div>
            
           
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0">
                            <i class="bi bi-bookmark-star-fill text-warning me-2"></i>
                            Marked Questions
                        </h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush" id="markedList">
                            <li class="list-group-item text-secondary">
                                
                                No marked questions yet
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

 
    <script src="js/exam.js"></script>
</body>
</html>
